<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App Storeへ移動中...</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      place-items: center;
      color: #1b1b1b;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      color: #0a7c32;
      font-weight: 700;
    }
  </style>
  <script>
    const CAMPAIGN_ID = "meta_stories_seedance_20260519";
    const params = new URLSearchParams(window.location.search);
    const source = params.get("src") || "meta_story";
    const placement = params.get("placement") || "";
    const destination = new URL("https://apps.apple.com/jp/app/gensou-ai/id6764897270");

    destination.searchParams.set("ct", CAMPAIGN_ID);
    destination.searchParams.set("pt", "meta");
    destination.searchParams.set("src", source);
    if (placement) destination.searchParams.set("placement", placement);

    function sendFunnelEvent(eventName) {
      const body = JSON.stringify({
        event: eventName,
        path: `${window.location.pathname}${window.location.search}`,
        referrer: document.referrer || null,
        props: {
          campaign_id: CAMPAIGN_ID,
          source,
          placement: placement || null,
          destination: destination.toString(),
          landing_host: window.location.host,
          happened_at: new Date().toISOString()
        }
      });

      try {
        fetch("https://gensou.ai/api/funnel", {
          method: "POST",
          mode: "no-cors",
          keepalive: true,
          body
        });
      } catch (_) {
        // Redirect must still work if tracking is blocked.
      }
    }

    function redirectToAppStore() {
      sendFunnelEvent("meta_story_appstore_redirect");
      window.location.replace(destination.toString());
    }

    window.addEventListener("DOMContentLoaded", () => {
      const fallback = document.querySelector("[data-app-store-link]");
      fallback.href = destination.toString();
      fallback.addEventListener("click", () => sendFunnelEvent("meta_story_appstore_manual_click"));
      redirectToAppStore();
    });
  </script>
</head>
<body>
  <main>
    <p>App Storeへ移動しています。</p>
    <p><a data-app-store-link href="https://apps.apple.com/jp/app/gensou-ai/id6764897270">移動しない場合はこちら</a></p>
  </main>
</body>
</html>
